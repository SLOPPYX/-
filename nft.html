<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>FF SLOPPYX — NFT</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
/* ─────────── Шрифты ─────────── */
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&family=JetBrains+Mono:wght@400;500&display=swap');

/* ─────────── Переменные по редкостям ─────────── */
:root {
  --bg-0: #050608;
  --bg-1: #0c0e12;
  --bg-2: #14171c;
  --line: rgba(255, 255, 255, 0.06);
  --text-0: #e8e9ec;
  --text-1: #9ba0a8;
  --text-2: #5a5e66;

  --rarity-common:         #c8ccd1;
  --rarity-rare:           #5BA9FF;
  --rarity-epic:           #B96FFF;
  --rarity-legendary:      #FFA940;
  --rarity-ultralegendary: #FF3A55;

  --rarity-common-glow:         rgba(200, 204, 209, 0.25);
  --rarity-rare-glow:           rgba(91, 169, 255, 0.45);
  --rarity-epic-glow:           rgba(185, 111, 255, 0.55);
  --rarity-legendary-glow:      rgba(255, 169, 64, 0.65);
  --rarity-ultralegendary-glow: rgba(255, 58, 85, 0.75);

  --accent: #FFA940;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  background: var(--bg-0);
  color: var(--text-0);
  font-family: 'Rajdhani', system-ui, sans-serif;
  font-weight: 500;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
  user-select: none;
  min-height: 100vh;
}

/* Атмосферный фон — носитель силы NFT */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255, 169, 64, 0.08), transparent 60%),
    radial-gradient(ellipse 60% 40% at 50% 100%, rgba(185, 111, 255, 0.05), transparent 70%),
    repeating-linear-gradient(180deg, transparent, transparent 39px, rgba(255,255,255,0.012) 40px),
    var(--bg-0);
  pointer-events: none;
}

/* Шум поверх */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9'/></filter><rect width='100%' height='100%' filter='url(%23n)' opacity='0.4'/></svg>");
  opacity: 0.025;
  pointer-events: none;
  mix-blend-mode: overlay;
}

#app { position: relative; z-index: 1; padding-top: var(--safe-top); padding-bottom: var(--safe-bottom); }

/* ─────────── Шапка ─────────── */
.hdr {
  padding: 14px 16px 8px;
  display: flex;
  align-items: center;
  gap: 11px;
}
.hdr-avatar {
  width: 38px; height: 38px;
  flex-shrink: 0;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), #ff7600);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  color: var(--bg-0);
  font-weight: 700;
  box-shadow: 0 0 12px rgba(255, 169, 64, 0.4);
  position: relative;
  overflow: hidden;
}
.hdr-avatar::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(115deg,
    transparent 30%,
    rgba(255,255,255,0.3) 50%,
    transparent 70%);
  background-size: 300% 300%;
  animation: avatarShine 3.5s ease-in-out infinite;
}
@keyframes avatarShine {
  0%, 100% { background-position: 200% 0; }
  50%      { background-position: -200% 0; }
}
.hdr-name-block {
  display: flex;
  flex-direction: column;
  min-width: 0;
}
.hdr-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.06em;
  color: var(--accent);
  line-height: 1;
}
.hdr-logo span { color: var(--text-0); }
.hdr-username {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--text-2);
  margin-top: 3px;
  letter-spacing: 0.04em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.hdr-spacer { flex: 1; min-width: 4px; }
.hdr-stats {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-align: right;
  line-height: 1.3;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.hdr-stat-row {
  display: flex;
  align-items: baseline;
  justify-content: flex-end;
  gap: 6px;
}
.hdr-stat-label {
  color: var(--text-2);
  font-size: 10px;
  letter-spacing: 0.06em;
}
.hdr-stat-val {
  color: var(--text-0);
  font-weight: 500;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 0.01em;
}
#balanceVal { font-size: 12px; }

/* ─────────── Tabs ─────────── */
.tabs {
  display: flex;
  margin: 8px 16px 16px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--bg-1);
  overflow: hidden;
}
.tab {
  flex: 1;
  padding: 12px 4px;
  text-align: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 0.06em;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.18s ease;
  position: relative;
  white-space: nowrap;
}
.tab:not(:last-child) { border-right: 1px solid var(--line); }
.tab.active {
  color: var(--accent);
  background: linear-gradient(180deg, rgba(255, 169, 64, 0.12), rgba(255, 169, 64, 0.04));
}
.tab.active::after {
  content: '';
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 28px; height: 2px;
  background: var(--accent);
  box-shadow: 0 0 12px var(--accent);
}

/* ─────────── P2P NFT (v133) ─────────── */
.p2p-container {
  padding: 0 16px 80px;
}
.p2p-stats {
  display: flex; gap: 10px;
  margin-bottom: 16px;
  padding: 12px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 10px;
}
.p2p-stat {
  flex: 1;
  text-align: center;
}
.p2p-stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  color: var(--accent);
  line-height: 1;
}
.p2p-stat-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px;
  color: var(--text-2);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-top: 4px;
}
.p2p-stat.warning .p2p-stat-num { color: #FF6B6B; }

.p2p-empty {
  text-align: center;
  padding: 40px 24px;
  color: var(--text-2);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  line-height: 1.5;
}
.p2p-empty-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }

/* Карточка листинга (отличается от обычной — есть продавец и кнопка) */
.p2p-card-wrap { padding: 12px 0; }
.p2p-listing {
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 12px;
  margin-bottom: 12px;
  position: relative;
}
.p2p-listing[data-rarity="rare"]      { border-color: rgba(91,169,255,0.4); }
.p2p-listing[data-rarity="epic"]      { border-color: rgba(185,111,255,0.4); }
.p2p-listing[data-rarity="legendary"] { border-color: rgba(255,169,64,0.5); }
.p2p-listing[data-rarity="ultralegendary"] {
  border-color: rgba(255,58,85,0.6);
  background: linear-gradient(180deg, var(--bg-1), rgba(255,58,85,0.05));
}

.p2p-listing-top {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}
.p2p-listing-vis {
  width: 80px; height: 64px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  padding: 4px;
}
.p2p-listing-vis svg {
  width: 100%; height: 100%;
  filter: drop-shadow(0 0 4px var(--card-rarity-glow, transparent));
}
.p2p-listing-info { flex: 1; min-width: 0; }
.p2p-listing-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 0.04em;
  color: var(--text-1);
  margin-bottom: 4px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.p2p-listing-meta {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  color: var(--text-2);
  display: flex; gap: 8px; flex-wrap: wrap;
}
.p2p-listing-rarity {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  letter-spacing: 0.06em;
  background: var(--card-rarity, var(--text-2));
  color: #000;
}
.p2p-listing[data-rarity="ultralegendary"] .p2p-listing-rarity {
  background: #FF3A55; color: #fff;
}
.p2p-listing-serial {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-2);
}

.p2p-listing-bottom {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--line);
}
.p2p-listing-price-block { flex: 1; }
.p2p-listing-price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  color: var(--accent);
  font-weight: 600;
}
.p2p-listing-catalog {
  font-family: 'Rajdhani', sans-serif;
  font-size: 10px;
  color: var(--text-2);
}
.p2p-listing-btn {
  padding: 9px 14px;
  border-radius: 8px;
  border: none;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 13px;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}
.p2p-listing-btn.buy {
  background: var(--accent);
  color: #1a1a1a;
}
.p2p-listing-btn.buy:active { transform: scale(0.96); }
.p2p-listing-btn.cancel {
  background: rgba(255,107,107,0.15);
  color: #FF6B6B;
  border: 1px solid rgba(255,107,107,0.3);
}
.p2p-listing-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.p2p-seller-badge {
  position: absolute;
  top: 8px; right: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-2);
  background: rgba(0,0,0,0.4);
  padding: 3px 6px;
  border-radius: 4px;
}
.p2p-seller-badge.is-mine {
  background: rgba(255,169,64,0.2);
  color: var(--accent);
}

/* Кнопка «продать» в модалке NFT */
.sell-btn {
  width: 100%;
  margin-top: 12px;
  padding: 14px;
  background: linear-gradient(135deg, #FFA940, #FF6B40);
  color: #1a1a1a;
  border: none;
  border-radius: 10px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 0.10em;
  cursor: pointer;
}
.sell-btn:active { transform: scale(0.98); }
.sell-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* Модалка ввода цены при выставлении */
.sell-modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 250;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s ease;
}
.sell-modal-overlay.show { opacity: 1; pointer-events: auto; }
.sell-modal-content {
  width: 100%; max-width: 400px;
  background: var(--bg-0);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 20px;
}
.sell-modal-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 0.10em;
  color: var(--text-1);
  margin-bottom: 4px;
}
.sell-modal-sub {
  font-family: 'Rajdhani', sans-serif;
  font-size: 12px;
  color: var(--text-2);
  margin-bottom: 16px;
}
.price-input-row {
  display: flex; gap: 8px; margin-bottom: 12px;
}
.price-input {
  flex: 1;
  padding: 14px;
  background: var(--bg-1);
  border: 1.5px solid var(--line);
  border-radius: 10px;
  color: var(--text-1);
  font-family: 'JetBrains Mono', monospace;
  font-size: 16px;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
.price-input:focus { border-color: var(--accent); }
.price-input.invalid { border-color: #FF6B6B; }
.price-hint {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  color: var(--text-2);
  margin-bottom: 16px;
  line-height: 1.5;
}
.price-hint .num { color: var(--accent); font-family: 'JetBrains Mono', monospace; }
.price-hint .err { color: #FF6B6B; }

.sell-modal-actions {
  display: flex; gap: 10px;
}
.sell-modal-actions button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 0.08em;
  cursor: pointer;
}
.btn-confirm { background: var(--accent); color: #1a1a1a; }
.btn-cancel { background: var(--bg-1); color: var(--text-2); border: 1px solid var(--line) !important; }
.btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

/* ─────────── Профиль (v131) ─────────── */
.profile-container {
  padding: 0 16px 80px;
}
.profile-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 20px 16px;
  background: linear-gradient(180deg, rgba(255, 169, 64, 0.08), rgba(255, 169, 64, 0.02));
  border: 1px solid var(--line);
  border-radius: 14px;
  margin-bottom: 16px;
}
.profile-avatar {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, #FFA940, #B96FFF);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  color: #fff;
  flex-shrink: 0;
  box-shadow: 0 0 18px rgba(255, 169, 64, 0.3);
}
.profile-info-flex { flex: 1; min-width: 0; }
.profile-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.04em;
  color: var(--text-1);
  margin-bottom: 4px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.profile-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-2);
  letter-spacing: 0.04em;
}
.profile-stats {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.profile-stat {
  padding: 14px 12px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 10px;
  text-align: center;
}
.profile-stat-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 24px;
  color: var(--accent);
  line-height: 1;
}
.profile-stat-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  color: var(--text-2);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-top: 6px;
}

.section-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 0.12em;
  color: var(--text-1);
  margin: 8px 4px 12px;
  display: flex; align-items: center; justify-content: space-between;
}
.section-hint {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  color: var(--text-2);
  letter-spacing: 0.04em;
  text-transform: none;
}

/* Showcase 3 слота */
.showcase-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 24px;
}
.showcase-slot {
  aspect-ratio: 3 / 4;
  background: var(--bg-1);
  border: 1.5px dashed var(--line);
  border-radius: 12px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  transition: all 0.2s ease;
  position: relative;
  overflow: hidden;
}
.showcase-slot:hover, .showcase-slot:active {
  border-color: var(--accent);
  background: rgba(255, 169, 64, 0.05);
}
.showcase-slot-plus {
  font-size: 32px;
  color: var(--text-2);
  font-weight: 200;
  margin-bottom: 4px;
}
.showcase-slot-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  color: var(--text-2);
  letter-spacing: 0.04em;
  padding: 0 8px;
  text-align: center;
}
/* Занятый слот — рендерим миниатюру */
.showcase-slot.filled {
  border-style: solid;
  border-color: var(--card-rarity, var(--line));
  background: linear-gradient(180deg, var(--bg-1) 0%, color-mix(in srgb, var(--card-rarity, var(--bg-1)) 8%, var(--bg-1)) 100%);
  padding: 6px;
}
.showcase-slot.filled .mini-weapon {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  width: 100%;
}
.showcase-slot.filled .mini-weapon svg {
  max-width: 100%;
  max-height: 100%;
  width: auto; height: auto;
  filter: drop-shadow(0 0 6px var(--card-rarity-glow, transparent));
}
.showcase-slot.filled .mini-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 10px;
  color: var(--card-rarity, var(--text-1));
  text-align: center;
  letter-spacing: 0.04em;
  margin-top: 4px;
  line-height: 1.2;
  overflow: hidden;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}
.showcase-slot.filled .mini-remove {
  position: absolute;
  top: 4px; right: 4px;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: rgba(0,0,0,0.6);
  color: #fff;
  font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  z-index: 5;
}

/* Переключатель публичности */
.privacy-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 12px;
  margin-bottom: 16px;
}
.privacy-text { flex: 1; min-width: 0; }
.privacy-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 0.08em;
  color: var(--text-1);
}
.privacy-desc {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  color: var(--text-2);
  margin-top: 2px;
}
.toggle {
  width: 44px; height: 24px;
  background: var(--bg-2);
  border-radius: 12px;
  position: relative;
  cursor: pointer;
  transition: background 0.2s ease;
  flex-shrink: 0;
  border: 1px solid var(--line);
}
.toggle.on { background: var(--accent); border-color: var(--accent); }
.toggle::after {
  content: '';
  position: absolute;
  width: 18px; height: 18px;
  border-radius: 50%;
  background: #fff;
  top: 2px; left: 3px;
  transition: left 0.2s ease;
}
.toggle.on::after { left: 21px; }

/* Поиск чужих профилей */
.search-row {
  display: flex; gap: 8px;
  margin-bottom: 12px;
}
.search-input {
  flex: 1;
  padding: 12px 14px;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 10px;
  color: var(--text-1);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  outline: none;
  -webkit-appearance: none;
  appearance: none;
}
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text-2); }
.search-btn {
  padding: 12px 20px;
  background: var(--accent);
  color: #1a1a1a;
  border: none;
  border-radius: 10px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  letter-spacing: 0.10em;
  cursor: pointer;
}
.search-btn:disabled { opacity: 0.4; }

.profile-empty-hint {
  text-align: center;
  padding: 28px 16px;
  color: var(--text-2);
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  line-height: 1.5;
}

/* Модалка выбора NFT для слота showcase */
.picker-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  display: flex; align-items: center; justify-content: center;
  padding: 16px;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s ease;
}
.picker-overlay.show { opacity: 1; pointer-events: auto; }
.picker-content {
  width: 100%; max-width: 400px; max-height: 80vh;
  background: var(--bg-0);
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 16px;
  overflow-y: auto;
}
.picker-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  letter-spacing: 0.10em;
  color: var(--text-1);
  margin-bottom: 14px;
  display: flex; justify-content: space-between; align-items: center;
}
.picker-close {
  width: 28px; height: 28px; cursor: pointer;
  background: var(--bg-1);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--text-2); font-size: 16px;
}
.picker-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
.picker-item {
  aspect-ratio: 3 / 4;
  background: var(--bg-1);
  border: 1px solid var(--line);
  border-radius: 8px;
  cursor: pointer;
  padding: 6px;
  display: flex; flex-direction: column;
  transition: all 0.15s ease;
}
.picker-item:active { transform: scale(0.96); }
.picker-item.picked {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(255, 169, 64, 0.3);
}
.picker-item-vis {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
}
.picker-item-vis svg {
  max-width: 100%; max-height: 100%;
  width: auto; height: auto;
}
.picker-item-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 9px;
  text-align: center;
  letter-spacing: 0.04em;
  margin-top: 4px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.picker-empty {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-2);
  font-family: 'Rajdhani', sans-serif;
}

/* ─────────── Сетка карт ─────────── */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 0 16px 80px;
}

/* ─────────── Карта (3D) ─────────── */
.card-wrap {
  perspective: 1200px;
  aspect-ratio: 3 / 4;
  transition: transform 0.3s ease;
}
.card-wrap:hover { transform: translateY(-2px); }

.card {
  width: 100%; height: 100%;
  position: relative;
  border-radius: 14px;
  background: linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 100%);
  border: 1px solid var(--card-rarity, var(--rarity-common));
  transform-style: preserve-3d;
  cursor: pointer;
  overflow: hidden;
  /* Точка вращения по умолчанию — центр */
  transform: rotateY(var(--rx, 0deg)) rotateX(var(--ry, 0deg));
  transition: transform 0.08s ease-out, box-shadow 0.3s ease;
  box-shadow:
    0 0 0 1px var(--card-rarity, var(--rarity-common)),
    0 4px 18px var(--card-rarity-glow, transparent),
    inset 0 1px 0 rgba(255,255,255,0.04);
}

/* Голограмма: переливающийся блик. Активируется через CSS-переменные mx/my (мышь/палец) */
.card::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(
    circle at var(--mx, 50%) var(--my, 50%),
    rgba(255,255,255,0.18) 0%,
    rgba(255,255,255,0.04) 30%,
    transparent 60%
  );
  pointer-events: none;
  opacity: 0.7;
  transition: opacity 0.2s;
  mix-blend-mode: screen;
}

/* Голографическая радуга — только для epic/legendary */
.card.holo::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(
    115deg,
    transparent 30%,
    rgba(255, 169, 64, 0.08) 40%,
    rgba(185, 111, 255, 0.10) 50%,
    rgba(91, 169, 255, 0.08) 60%,
    transparent 70%
  );
  background-size: 300% 300%;
  background-position: var(--holo-x, 0%) var(--holo-y, 0%);
  mix-blend-mode: overlay;
  pointer-events: none;
}

/* Контент карты */
.card-inner {
  position: relative;
  width: 100%; height: 100%;
  padding: 12px 11px;
  display: flex;
  flex-direction: column;
  z-index: 2;
}
.card-rarity-tag {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 10px;
  letter-spacing: 0.16em;
  color: var(--card-rarity);
  text-shadow: 0 0 8px var(--card-rarity-glow);
}
.card-emoji {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 56px;
  filter: drop-shadow(0 0 16px var(--card-rarity-glow));
  transform: translateZ(20px);
}

/* ─────────── SVG-силуэты оружия + анимации по редкостям ─────────── */
.card-weapon-vis {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 6px 4px;
  position: relative;
  transform: translateZ(20px);
}
.card-weapon-vis svg {
  width: 100%;
  height: auto;
  max-height: 100%;
  filter: drop-shadow(0 0 8px var(--card-rarity-glow));
  /* по умолчанию — общая лёгкая жизнь */
  animation: weaponBreathe 3.4s ease-in-out infinite;
}

/* Большая версия для модалки */
.modal-weapon-vis {
  margin: 8px 0 12px;
  display: flex;
  justify-content: center;
  position: relative;
  min-height: 90px;
}
.modal-weapon-big svg {
  width: 75%;
  max-width: 240px;
  height: auto;
  filter: drop-shadow(0 0 18px var(--card-rarity-glow));
}

/* Дыхание — лёгкое масштабирование */
@keyframes weaponBreathe {
  0%, 100% { transform: scale(1); }
  50%      { transform: scale(1.04); }
}

/* COMMON — лёгкое мерцание контура */
.card[data-rarity="common"] .card-weapon-vis svg path,
.card[data-rarity="common"] .card-weapon-vis svg rect,
.card[data-rarity="common"] .card-weapon-vis svg line,
.card[data-rarity="common"] .card-weapon-vis svg circle {
  animation: commonFlicker 4s ease-in-out infinite;
}
@keyframes commonFlicker {
  0%, 100% { opacity: 1; }
  50%      { opacity: 0.78; }
}

/* RARE — пульс свечения */
.card[data-rarity="rare"] .card-weapon-vis svg {
  animation: weaponBreathe 3.4s ease-in-out infinite,
             rarePulse 2.2s ease-in-out infinite;
}
@keyframes rarePulse {
  0%, 100% { filter: drop-shadow(0 0 6px var(--card-rarity-glow)); }
  50%      { filter: drop-shadow(0 0 22px var(--card-rarity-glow))
                     drop-shadow(0 0 30px var(--card-rarity-glow)); }
}

/* EPIC — дрожь + цветовая пульсация */
.card[data-rarity="epic"] .card-weapon-vis svg {
  animation: weaponBreathe 3.4s ease-in-out infinite,
             epicTremble 0.18s steps(2) infinite,
             epicGlow 1.6s ease-in-out infinite;
}
@keyframes epicTremble {
  0%   { transform: translate(0px, 0px); }
  25%  { transform: translate(0.6px, -0.4px); }
  50%  { transform: translate(-0.5px, 0.5px); }
  75%  { transform: translate(0.4px, 0.5px); }
  100% { transform: translate(0px, 0px); }
}
@keyframes epicGlow {
  0%, 100% { filter: drop-shadow(0 0 8px var(--card-rarity-glow))
                     drop-shadow(0 0 14px var(--card-rarity-glow)); }
  50%      { filter: drop-shadow(0 0 18px var(--card-rarity-glow))
                     drop-shadow(0 0 32px rgba(185, 111, 255, 0.7))
                     drop-shadow(0 0 50px rgba(91, 169, 255, 0.4)); }
}

/* LEGENDARY — вращение + золотые лучи + сильное свечение */
.card[data-rarity="legendary"] .card-weapon-vis {
  position: relative;
}
.card[data-rarity="legendary"] .card-weapon-vis::before {
  /* Лучи — крутятся за оружием */
  content: '';
  position: absolute;
  inset: -10%;
  background:
    conic-gradient(
      from 0deg,
      transparent 0deg,
      rgba(255, 169, 64, 0.25) 30deg,
      transparent 60deg,
      transparent 90deg,
      rgba(255, 169, 64, 0.18) 130deg,
      transparent 165deg,
      transparent 200deg,
      rgba(255, 169, 64, 0.22) 240deg,
      transparent 275deg,
      transparent 310deg,
      rgba(255, 169, 64, 0.15) 340deg,
      transparent 360deg
    );
  border-radius: 50%;
  animation: legendaryRays 12s linear infinite;
  z-index: 0;
  filter: blur(4px);
  opacity: 0.6;
}
.card[data-rarity="legendary"] .card-weapon-vis svg {
  position: relative;
  z-index: 1;
  animation: weaponBreathe 3.4s ease-in-out infinite,
             legendaryPulseGlow 2.0s ease-in-out infinite;
}
@keyframes legendaryRays {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@keyframes legendaryPulseGlow {
  0%, 100% { filter: drop-shadow(0 0 12px var(--card-rarity-glow))
                     drop-shadow(0 0 22px rgba(255, 169, 64, 0.5)); }
  50%      { filter: drop-shadow(0 0 22px var(--card-rarity-glow))
                     drop-shadow(0 0 40px rgba(255, 169, 64, 0.8))
                     drop-shadow(0 0 60px rgba(255, 169, 64, 0.4)); }
}

/* ULTRALEGENDARY — красные лучи + двойное вращение + intense pulse */
.card[data-rarity="ultralegendary"] .card-weapon-vis {
  position: relative;
}
.card[data-rarity="ultralegendary"] .card-weapon-vis::before {
  /* Красные лучи, крутятся быстрее legendary в обратную сторону */
  content: '';
  position: absolute;
  inset: -12%;
  background:
    conic-gradient(
      from 0deg,
      transparent 0deg,
      rgba(255, 58, 85, 0.35) 25deg,
      transparent 55deg,
      rgba(255, 58, 85, 0.25) 90deg,
      transparent 125deg,
      rgba(255, 58, 85, 0.30) 165deg,
      transparent 200deg,
      rgba(255, 58, 85, 0.28) 240deg,
      transparent 275deg,
      rgba(255, 58, 85, 0.32) 305deg,
      transparent 340deg,
      transparent 360deg
    );
  border-radius: 50%;
  animation: ultraLegRays 8s linear infinite reverse;
  z-index: 0;
  filter: blur(5px);
  opacity: 0.75;
}
.card[data-rarity="ultralegendary"] .card-weapon-vis::after {
  /* Второй слой лучей, медленнее, создаёт двойное вращение */
  content: '';
  position: absolute;
  inset: -8%;
  background:
    conic-gradient(
      from 90deg,
      transparent 0deg,
      rgba(255, 200, 100, 0.18) 60deg,
      transparent 120deg,
      rgba(255, 100, 100, 0.20) 180deg,
      transparent 240deg,
      rgba(255, 200, 100, 0.18) 300deg,
      transparent 360deg
    );
  border-radius: 50%;
  animation: ultraLegRays 14s linear infinite;
  z-index: 0;
  filter: blur(3px);
  opacity: 0.5;
  pointer-events: none;
}
.card[data-rarity="ultralegendary"] .card-weapon-vis svg {
  position: relative;
  z-index: 1;
  animation: weaponBreathe 3.4s ease-in-out infinite,
             ultraLegGlow 1.5s ease-in-out infinite;
}
@keyframes ultraLegRays {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
@keyframes ultraLegGlow {
  0%, 100% { filter: drop-shadow(0 0 14px var(--card-rarity-glow))
                     drop-shadow(0 0 28px rgba(255, 58, 85, 0.6)); }
  50%      { filter: drop-shadow(0 0 28px var(--card-rarity-glow))
                     drop-shadow(0 0 50px rgba(255, 58, 85, 0.9))
                     drop-shadow(0 0 80px rgba(255, 100, 100, 0.5)); }
}

/* В модалке — те же эффекты, лучи только для legendary */
.modal-weapon-vis::before {
  content: none;
}
.modal-content .modal-weapon-vis[data-rarity="legendary"]::before,
.modal-content .modal-weapon-vis[data-rarity="ultralegendary"]::before {
  content: '';
}
.card-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 15px;
  letter-spacing: 0.04em;
  line-height: 1.1;
  color: var(--text-0);
  margin-top: auto;
}
.card-weapon {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-2);
  margin-top: 3px;
  letter-spacing: 0.05em;
}
.card-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--text-2);
  position: absolute;
  top: 12px; right: 11px;
}
.card-price {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 14px;
  color: var(--accent);
  letter-spacing: 0.05em;
  margin-top: 6px;
}
.card-price.locked {
  color: var(--text-2);
  font-size: 11px;
  letter-spacing: 0.1em;
}
.card-price.locked::before { content: '🔒 '; }

/* Серийник #42 / 100 — нижний правый угол карты, в моноширинном стиле */
.card-serial {
  position: absolute;
  bottom: 10px;
  right: 11px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 0.04em;
  color: var(--text-2);
  background: rgba(0, 0, 0, 0.45);
  border: 1px solid var(--card-rarity);
  border-radius: 4px;
  padding: 2px 6px;
  z-index: 4;
  backdrop-filter: blur(4px);
}
.card-serial.owned {
  color: var(--card-rarity);
  text-shadow: 0 0 8px var(--card-rarity-glow);
  font-weight: 600;
}
.card-serial.sold-out {
  color: #ff5555;
  border-color: #ff5555;
  letter-spacing: 0.1em;
}

/* Декоративные углы — зачем стандартные рамки когда есть это */
.corner {
  position: absolute;
  width: 12px; height: 12px;
  border: 1.5px solid var(--card-rarity);
  z-index: 3;
}
.corner.tl { top: 6px; left: 6px; border-right: none; border-bottom: none; }
.corner.tr { top: 6px; right: 6px; border-left: none; border-bottom: none; }
.corner.bl { bottom: 6px; left: 6px; border-right: none; border-top: none; }
.corner.br { bottom: 6px; right: 6px; border-left: none; border-top: none; }

/* Светящаяся полоса внизу карты — индикатор редкости */
.card::before,
.card .glow-bar {
  pointer-events: none;
}
.card .glow-bar {
  position: absolute;
  bottom: 0; left: 8%; right: 8%;
  height: 2px;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--card-rarity) 20%,
    var(--card-rarity) 80%,
    transparent 100%);
  filter: blur(0.5px) drop-shadow(0 0 6px var(--card-rarity-glow));
  z-index: 2;
  opacity: 0.85;
}
.card[data-rarity="legendary"] .glow-bar,
.card[data-rarity="ultralegendary"] .glow-bar,
.card[data-rarity="epic"] .glow-bar {
  animation: glowBarPulse 2.4s ease-in-out infinite;
}
@keyframes glowBarPulse {
  0%, 100% { opacity: 0.7; transform: scaleX(0.92); }
  50%      { opacity: 1.0; transform: scaleX(1); }
}

/* Внутренняя двойная рамка — современный военно-HUD стиль */
.card .inner-frame {
  position: absolute;
  inset: 4px;
  border: 1px solid var(--card-rarity);
  border-radius: 11px;
  opacity: 0.18;
  pointer-events: none;
  z-index: 1;
}

/* Рарити-цвета на карты */
.card[data-rarity="common"] {
  --card-rarity: var(--rarity-common);
  --card-rarity-glow: var(--rarity-common-glow);
}
.card[data-rarity="rare"] {
  --card-rarity: var(--rarity-rare);
  --card-rarity-glow: var(--rarity-rare-glow);
}
.card[data-rarity="epic"] {
  --card-rarity: var(--rarity-epic);
  --card-rarity-glow: var(--rarity-epic-glow);
}
.card[data-rarity="legendary"] {
  --card-rarity: var(--rarity-legendary);
  --card-rarity-glow: var(--rarity-legendary-glow);
}
.card[data-rarity="ultralegendary"] {
  --card-rarity: var(--rarity-ultralegendary);
  --card-rarity-glow: var(--rarity-ultralegendary-glow);
}

/* Лёгкая пульсация рамки для legendary и ultralegendary */
@keyframes legendaryPulse {
  0%, 100% { box-shadow: 0 0 0 1px var(--card-rarity), 0 4px 18px var(--card-rarity-glow), inset 0 1px 0 rgba(255,255,255,0.04); }
  50%      { box-shadow: 0 0 0 1px var(--card-rarity), 0 6px 28px var(--card-rarity-glow), inset 0 1px 0 rgba(255,255,255,0.08); }
}
.card[data-rarity="legendary"] {
  animation: legendaryPulse 2.6s ease-in-out infinite;
}
/* Ultralegendary — более интенсивная пульсация + двойная рамка эффект */
@keyframes ultraPulse {
  0%, 100% {
    box-shadow:
      0 0 0 1.5px var(--card-rarity),
      0 0 18px var(--card-rarity-glow),
      0 0 38px rgba(255, 58, 85, 0.4),
      inset 0 1px 0 rgba(255,255,255,0.06);
  }
  50% {
    box-shadow:
      0 0 0 2px var(--card-rarity),
      0 0 32px var(--card-rarity-glow),
      0 0 60px rgba(255, 58, 85, 0.6),
      0 0 90px rgba(255, 58, 85, 0.3),
      inset 0 1px 0 rgba(255,255,255,0.12);
  }
}
.card[data-rarity="ultralegendary"] {
  animation: ultraPulse 1.8s ease-in-out infinite;
}

/* ─────────── Empty state ─────────── */
.empty {
  padding: 60px 24px;
  text-align: center;
  color: var(--text-2);
}
.empty-icon { font-size: 48px; opacity: 0.4; }
.empty-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.1em;
  color: var(--text-1);
  margin: 14px 0 6px;
}
.empty-sub { font-size: 13px; line-height: 1.5; }

/* Loading skeleton */
.skel {
  background: linear-gradient(90deg, var(--bg-1) 0%, var(--bg-2) 50%, var(--bg-1) 100%);
  background-size: 200% 100%;
  animation: skelShimmer 1.4s ease-in-out infinite;
  border-radius: 14px;
  aspect-ratio: 3/4;
}
@keyframes skelShimmer {
  0% { background-position: 200% 0; }
  100% { background-position: -200% 0; }
}

/* ─────────── Modal с подробной картой ─────────── */
.modal-back {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(5, 6, 8, 0.85);
  backdrop-filter: blur(8px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.modal-back.open {
  opacity: 1;
  pointer-events: auto;
}
.modal {
  background: var(--bg-1);
  border: 1px solid var(--card-rarity, var(--line));
  border-radius: 16px;
  padding: 18px;
  max-width: 360px;
  width: 100%;
  max-height: 88vh;
  overflow-y: auto;
  transform: scale(0.92) translateY(20px);
  transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 0 0 1px var(--card-rarity, var(--line)), 0 20px 60px rgba(0,0,0,0.6);
}
.modal-back.open .modal {
  transform: scale(1) translateY(0);
}
.modal-header {
  display: flex;
  align-items: center;
  margin-bottom: 12px;
}
.modal-rarity {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 12px;
  letter-spacing: 0.16em;
  color: var(--card-rarity);
  text-shadow: 0 0 10px var(--card-rarity-glow);
}
.modal-close {
  margin-left: auto;
  width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-2);
  border: 1px solid var(--line);
  border-radius: 8px;
  color: var(--text-1);
  cursor: pointer;
  font-size: 16px;
}
.modal-emoji {
  font-size: 80px;
  text-align: center;
  margin: 10px 0;
  filter: drop-shadow(0 0 24px var(--card-rarity-glow));
}
.modal-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 22px;
  letter-spacing: 0.04em;
  text-align: center;
  margin: 8px 0 4px;
}
.modal-tag {
  text-align: center;
  font-style: italic;
  color: var(--text-1);
  font-size: 13px;
  margin-bottom: 16px;
  padding: 0 12px;
}
.modal-info-grid {
  display: grid;
  grid-template-columns: max-content 1fr;
  gap: 6px 12px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  margin-bottom: 16px;
  padding: 12px;
  background: var(--bg-2);
  border-radius: 10px;
  border: 1px solid var(--line);
}
.modal-info-grid dt { color: var(--text-2); }
.modal-info-grid dd { color: var(--text-0); margin: 0; }
.modal-lore {
  font-size: 13px;
  color: var(--text-1);
  line-height: 1.55;
  white-space: pre-wrap;
  padding: 12px;
  background: rgba(255,255,255,0.02);
  border-left: 2px solid var(--card-rarity);
  border-radius: 4px;
}
.modal-action {
  width: 100%;
  margin-top: 16px;
  padding: 14px;
  background: var(--card-rarity);
  border: none;
  border-radius: 10px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;

  padding: 12px 18px;

  pointer-events: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  max-width: 90%;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

// ═══════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════
async function api(path) {
  const url = `${API_BASE}${path}${path.includes('?') ? '&' : '?'}uid=${UID}&secret=${encodeURIComponent(SECRET)}`;
  try {
    const r = await fetch(url, {
      headers: { 'ngrok-skip-browser-warning': '1' },
    });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    return await r.json();
  } catch (e) {
    console.error('API error', path, e);
    return { ok: false, error: 'network' };
  }
}

async function apiPost(path, body) {
  const url = `${API_BASE}${path}`;
  try {
    const r = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
      body: JSON.stringify({ uid: UID, secret: SECRET, ...body }),
    });
    return await r.json();
  } catch (e) {
    console.error('API POST error', path, e);
    return { ok: false, error: 'network' };
  }
}

const RARITY_PALETTE = {
  common:         { col: '#c8ccd1', colLight: '#f0f1f3', colDark: '#7a7d82' },
  rare:           { col: '#5BA9FF', colLight: '#a8d2ff', colDark: '#2c5d9e' },
  epic:           { col: '#B96FFF', colLight: '#e0b8ff', colDark: '#6a2faf' },
  legendary:      { col: '#FFA940', colLight: '#ffd089', colDark: '#a36500' },
  ultralegendary: { col: '#FF3A55', colLight: '#ff8b9c', colDark: '#a01525' },
};

function getWeaponSVG(weaponName, rarity) {
  const palette = RARITY_PALETTE[rarity] || RARITY_PALETTE.common;
  const builders = {
    M1014: svgM1014, Groza: svgGroza, M1887: svgM1887, AWM: svgAWM,
    'AK-47': svgAK47, SCAR: svgSCAR, 'MP-40': svgMP40,
    G18: svgG18, 'Desert Eagle': svgDeagle, UMP: svgUMP,
  };
  const fn = builders[weaponName];
  if (!fn) {
    return `<svg viewBox="0 0 100 100"><rect x="10" y="10" width="80" height="80" rx="6" fill="none" stroke="${palette.col}" stroke-width="2"/></svg>`;
  }
  return fn(palette);
}


function renderCard(item, opts = {}) {
  const r = item.rarity || 'common';
  const isHolo = (r === 'epic' || r === 'legendary' || r === 'ultralegendary');
  const date = item.obtained_at || '';
  const owned = state.ownedIds.has(item.id);
  const lang = LANG;

  // Серийник — для МОИХ карт показываем #42 / 100, для маркета — общий тираж
  let serialHtml = '';
  if (opts.market) {
    if (item.sold_out) {
      serialHtml = `<div class="card-serial sold-out">${lang === 'en' ? 'SOLD OUT' : 'РАСКУПЛЕНО'}</div>`;
    } else if (item.max_supply) {
      serialHtml = `<div class="card-serial">${item.issued || 0}/${item.max_supply}</div>`;
    }
  } else {
    if (item.serial && item.max_supply) {
      serialHtml = `<div class="card-serial owned">#${item.serial}/${item.max_supply}</div>`;
    } else if (item.serial) {
      serialHtml = `<div class="card-serial owned">#${item.serial}</div>`;
    }
  }

  let priceHtml = '';
  if (opts.market) {
    if (item.price === null || item.price === undefined) {
      priceHtml = `<div class="card-price locked">${t('price_locked')}</div>`;
    } else if (owned) {
      priceHtml = `<div class="card-price">✓ ${t('btn_owned')}</div>`;
    } else {
      priceHtml = `<div class="card-price">${item.price.toLocaleString()} 💰</div>`;
    }
  }

  return `
    <div class="card-wrap" data-id="${item.id}">
      <div class="card ${isHolo ? 'holo' : ''}" data-rarity="${r}" data-id="${item.id}">
        <div class="inner-frame"></div>
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div class="card-inner">
          <div class="card-rarity-tag">${RARITY_LABEL[r] || r.toUpperCase()}</div>
          ${date ? `<div class="card-date">${date}</div>` : ''}
          <div class="card-weapon-vis">${getWeaponSVG(item.weapon, r)}</div>
          <div class="card-name">${fmtName(item)}</div>
          <div class="card-weapon">${item.weapon || ''}</div>
          ${serialHtml}
          ${priceHtml}
        </div>
        <div class="glow-bar"></div>
      </div>
    </div>
  `;
}

function renderGrid(items, opts) {
  if (!items || items.length === 0) {
    if (opts.market) return renderEmpty('empty_market_title', 'empty_market_sub', '🛒');
    return renderEmpty('empty_my_title', 'empty_my_sub');
  }
  return `<div class="grid">${items.map(it => renderCard(it, opts)).join('')}</div>`;
}

function setContent(html) {
  document.getElementById('content').innerHTML = html;
  attachCardHandlers();
}

// ═══════════════════════════════════════════════════════════
// 3D-эффект на карты + клик → modal
// ═══════════════════════════════════════════════════════════
function attachCardHandlers() {
  const wraps = document.querySelectorAll('.card-wrap');
  wraps.forEach(wrap => {
    const card = wrap.querySelector('.card');
    if (!card) return;

    let raf = null;
    let pending = null;

    const apply = () => {
      raf = null;
      if (!pending) return;
      const { rect, x, y } = pending;
      const px = (x - rect.left) / rect.width;
      const py = (y - rect.top) / rect.height;
      const rotY = (px - 0.5) * 22;   // макс 11° в каждую сторону
      const rotX = (0.5 - py) * 22;
      card.style.setProperty('--rx', rotY + 'deg');
      card.style.setProperty('--ry', rotX + 'deg');
      card.style.setProperty('--mx', (px * 100) + '%');
      card.style.setProperty('--my', (py * 100) + '%');
      // Голограмма-фон смещается
      card.style.setProperty('--holo-x', (px * 100) + '%');
      card.style.setProperty('--holo-y', (py * 100) + '%');
    };

    const move = (e) => {
      const rect = card.getBoundingClientRect();
      let x, y;
      if (e.touches && e.touches[0]) {
        x = e.touches[0].clientX;
        y = e.touches[0].clientY;
      } else {
        x = e.clientX;
        y = e.clientY;
      }
      pending = { rect, x, y };
      if (!raf) raf = requestAnimationFrame(apply);
    };

    const reset = () => {
      pending = null;
      card.style.setProperty('--rx', '0deg');
      card.style.setProperty('--ry', '0deg');
      card.style.setProperty('--mx', '50%');
      card.style.setProperty('--my', '50%');
    };

    card.addEventListener('mousemove', move);
    card.addEventListener('mouseleave', reset);
    card.addEventListener('touchmove', move, { passive: true });
    card.addEventListener('touchend', reset);
    card.addEventListener('touchcancel', reset);

    // Клик/тап → modal
    let downX = 0, downY = 0, downT = 0;
    const onDown = (e) => {
      const t = e.touches && e.touches[0] ? e.touches[0] : e;
      downX = t.clientX; downY = t.clientY; downT = Date.now();
    };
    const onUp = (e) => {
      const t = e.changedTouches && e.changedTouches[0] ? e.changedTouches[0] : e;
      const dx = Math.abs(t.clientX - downX);
      const dy = Math.abs(t.clientY - downY);
      const dt = Date.now() - downT;
      if (dx < 10 && dy < 10 && dt < 400) {
        const id = card.dataset.id;
        try { tg.HapticFeedback.impactOccurred('light'); } catch(e) {}
        openCardModal(id);
      }
    };
    card.addEventListener('mousedown', onDown);
    card.addEventListener('mouseup', onUp);
    card.addEventListener('touchstart', onDown, { passive: true });
    card.addEventListener('touchend', onUp);
  });
}

// ═══════════════════════════════════════════════════════════
// Modal
// ═══════════════════════════════════════════════════════════
function findItem(id) {
  if (state.tab === 'my') {
    return (state.myItems || []).find(x => x.id === id);
  } else {
    return (state.marketItems || []).find(x => x.id === id);
  }
}

function openCardModal(id) {
  const item = findItem(id);
  if (!item) return;
  const r = item.rarity || 'common';
  const owned = state.ownedIds.has(item.id);

  let priceText, btnLabel, btnDisabled, btnAction;
  let extraBtn = '';  // дополнительная кнопка (продать)
  if (state.tab === 'market') {
    if (item.price === null || item.price === undefined) {
      priceText = t('price_locked');
      btnLabel  = t('btn_locked');
      btnDisabled = true;
      btnAction = null;
    } else if (owned) {
      priceText = `${item.price.toLocaleString()} 💰`;
      btnLabel  = `✓ ${t('btn_owned')}`;
      btnDisabled = true;
      btnAction = null;
    } else {
      priceText = `${item.price.toLocaleString()} 💰`;
      btnLabel  = `${t('btn_buy')} — ${item.price.toLocaleString()}`;
      btnDisabled = false;
      btnAction = () => buyNft(item.id);
    }
  } else {
    // МОИ — кнопка «Продать» + «Закрыть»
    priceText = item.price !== null && item.price !== undefined
      ? `${item.price.toLocaleString()} 💰`
      : '—';
    btnLabel = t('btn_close');
    btnDisabled = false;
    btnAction = () => closeModal();
    // Кнопка продажи — только если у NFT есть цена
    if (item.price && item.serial) {
      extraBtn = `<button class="sell-btn" id="modalSellBtn">💰 ПРОДАТЬ НА P2P</button>`;
    }
  }

  const modalEl = document.getElementById('modalCard');
  modalEl.style.setProperty('--card-rarity', `var(--rarity-${r})`);
  modalEl.style.setProperty('--card-rarity-glow', `var(--rarity-${r}-glow)`);

  modalEl.innerHTML = `
    <div class="modal-header">
      <div class="modal-rarity">${RARITY_LABEL[r] || r}</div>
      <button class="modal-close" id="modalCloseBtn">✕</button>
    </div>
    <div class="modal-weapon-vis modal-weapon-big">${getWeaponSVG(item.weapon, r)}</div>
    <div class="modal-name">${fmtName(item)}</div>
    <div class="modal-tag">«${fmtTagline(item)}»</div>
    <dl class="modal-info-grid">
      <dt>${t('weapon_label')}</dt><dd>${item.weapon || '—'}</dd>
      <dt>${t('rarity_label')}</dt><dd style="color: var(--rarity-${r})">${RARITY_LABEL[r] || r}</dd>
      ${item.serial ? `<dt>${t('edition_label')}</dt><dd style="color: var(--rarity-${r}); font-weight: 600">#${item.serial}${item.max_supply ? ' / ' + item.max_supply : ''}</dd>` : ''}
      ${(!item.serial && item.max_supply) ? `<dt>${t('supply_label')}</dt><dd>${item.issued || 0} / ${item.max_supply}</dd>` : ''}
      ${item.obtained_at ? `<dt>${t('obtained_label')}</dt><dd>${item.obtained_at}</dd>` : ''}
      <dt>${t('price_label')}</dt><dd>${priceText}</dd>
    </dl>
    <div class="modal-lore">${fmtLore(item)}</div>
    <button class="modal-action" id="modalActionBtn" ${btnDisabled ? 'disabled' : ''}>${btnLabel}</button>
    ${extraBtn}
  `;

  document.getElementById('modal').classList.add('open');
  document.getElementById('modalCloseBtn').onclick = closeModal;
  if (btnAction) document.getElementById('modalActionBtn').onclick = btnAction;
  // Кнопка «Продать» — если есть
  const sellBtn = document.getElementById('modalSellBtn');
  if (sellBtn) {
    sellBtn.onclick = () => {
      closeModal();
      openSellModal(item);
    };
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

// ═══════════════════════════════════════════════════════════
// Buy (заглушка пока цены = null)
// ═══════════════════════════════════════════════════════════
async function buyNft(id) {
  try { tg.HapticFeedback.impactOccurred('medium'); } catch(e) {}
  const r = await apiPost('/casino/nft/buy', { nft_id: id });
  if (r.ok) {
    showToast('✓ Куплено!');
    closeModal();
    loadMy();
    loadMarket();
  } else if (r.error === 'not_for_sale') {
    showToast(t('not_for_sale'));
  } else if (r.error === 'insufficient_funds') {
    showToast('Недостаточно токенов');
  } else if (r.error === 'already_owned') {
    showToast('Уже куплено');
  } else {
    showToast(r.message || r.error || 'Ошибка');
  }
}

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// Tabs
// ═══════════════════════════════════════════════════════════
document.querySelectorAll('.tab').forEach(tabEl => {
  tabEl.addEventListener('click', () => {
    if (tabEl.classList.contains('active')) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tabEl.classList.add('active');
    state.tab = tabEl.dataset.tab;
    try { tg.HapticFeedback.selectionChanged(); } catch(e) {}
    if      (state.tab === 'my')      showMy();
    else if (state.tab === 'market')  showMarket();
    else if (state.tab === 'p2p')     showP2P();
    else if (state.tab === 'profile') showProfile();
  });
});

// Loaders
// ═══════════════════════════════════════════════════════════
function fmtTokens(n) {
  if (typeof n !== 'number') return '—';
  return n.toLocaleString('ru-RU').replace(/\s/g, '\u202F');
}

async function loadMe() {
  const r = await api('/casino/me');
  if (!r.ok) return;
  const nick = r.nick || `user_${r.uid}`;
  document.getElementById('hdrUsername').textContent = '@' + nick;
  const initial = (nick.replace('@','').trim()[0] || '⬢').toUpperCase();
  document.getElementById('hdrAvatarText').textContent = initial;
  document.getElementById('balanceVal').textContent = fmtTokens(r.balance);
  document.getElementById('nftCount').textContent = r.nft_count;
  state.me = r;
}

async function loadMy() {
  if (state.myItems) { showMy(); return; }
  setContent(`<div class="grid"><div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>`);
  const r = await api('/casino/nft/list');
  if (!r.ok) {
    if (state.tab === 'my') setContent(renderError());
    return;
  }
  state.myItems = r.nfts || [];
  state.ownedIds = new Set(state.myItems.map(x => x.id));
  document.getElementById('nftCount').textContent = state.myItems.length;
  if (state.tab === 'my') showMy();
}

async function loadMarket() {
  if (state.marketItems) { if (state.tab === 'market') showMarket(); return; }
  if (state.tab === 'market') {
    setContent(`<div class="grid"><div class="skel"></div><div class="skel"></div><div class="skel"></div><div class="skel"></div></div>`);
  }
  const r = await api('/casino/nft/market');
  if (!r.ok) {
    if (state.tab === 'market') setContent(renderError());
    return;
  }
  state.marketItems = r.items || [];
  if (state.tab === 'market') showMarket();
}

function showMy() {
  setContent(renderGrid(state.myItems, { market: false }));
}
function showMarket() {
  setContent(renderGrid(state.marketItems, { market: true }));
}

// ═══════════════════════════════════════════════════════════
// Профиль (v131)
// ═══════════════════════════════════════════════════════════
async function loadProfile() {
  const r = await api('/casino/profile/me');
  if (!r.ok) return null;
  state.profile = r;
  return r;
}

async function showProfile() {
  // Сначала покажем скелетон
  setContent(`<div class="profile-container">
    <div class="skel" style="height: 100px; border-radius: 14px; margin-bottom: 16px;"></div>
    <div class="skel" style="height: 70px; border-radius: 10px; margin-bottom: 16px;"></div>
    <div class="skel" style="height: 200px; border-radius: 12px;"></div>
  </div>`);

  // Загружаем профиль и список моих NFT (если ещё не)
  if (!state.profile) await loadProfile();
  if (!state.myItems)  await loadMy();
  const p = state.profile;
  if (!p) { setContent(renderError()); return; }

  renderProfile();
}

function renderProfile() {
  const p   = state.profile || {};
  const me  = state.me || {};
  const myItems = state.myItems || [];
  const showcase = p.showcase || [];
  const nick = me.nick || `user_${me.uid || ''}`;
  const initial = (nick.replace('@','').trim()[0] || '⬢').toUpperCase();

  // 3 слота
  let slotsHtml = '';
  for (let i = 0; i < 3; i++) {
    const nftId = showcase[i];
    if (nftId) {
      const card = myItems.find(c => c.id === nftId);
      if (card) {
        const palette = RARITY_PALETTE[card.rarity] || RARITY_PALETTE.common;
        const svg = getWeaponSVG(card.weapon, card.rarity);
        const name = card.name_ru || card.name_en || card.weapon || nftId;
        slotsHtml += `
          <div class="showcase-slot filled" data-rarity="${card.rarity}"
               style="--card-rarity: ${palette.col}; --card-rarity-glow: ${palette.col}40;"
               data-slot="${i}">
            <div class="mini-remove" data-slot-remove="${i}">×</div>
            <div class="mini-weapon">${svg}</div>
            <div class="mini-name">${escapeHtml(name)}</div>
          </div>`;
      } else {
        slotsHtml += slotEmpty(i);
      }
    } else {
      slotsHtml += slotEmpty(i);
    }
  }

  const isPub = !!p.is_public;
  const html = `
  <div class="profile-container">
    <!-- Шапка профиля -->
    <div class="profile-header">
      <div class="profile-avatar">${escapeHtml(initial)}</div>
      <div class="profile-info-flex">
        <div class="profile-name">${escapeHtml(nick.startsWith('@') ? nick : '@'+nick)}</div>
        <div class="profile-id">ID: ${p.user_id}</div>
      </div>
    </div>

    <!-- Статистика -->
    <div class="profile-stats">
      <div class="profile-stat">
        <div class="profile-stat-num">${p.nft_count || 0}</div>
        <div class="profile-stat-label">NFT</div>
      </div>
      <div class="profile-stat">
        <div class="profile-stat-num">${escapeHtml(p.reg_date || '—')}</div>
        <div class="profile-stat-label">В ИГРЕ С</div>
      </div>
    </div>

    <!-- Showcase -->
    <div class="section-title">
      <span>ВИТРИНА</span>
      <span class="section-hint">тапни слот чтобы выбрать NFT</span>
    </div>
    <div class="showcase-grid">${slotsHtml}</div>

    <!-- Переключатель публичности -->
    <div class="privacy-row">
      <div class="privacy-text">
        <div class="privacy-title">ПУБЛИЧНЫЙ ПРОФИЛЬ</div>
        <div class="privacy-desc">${isPub ? 'Другие могут найти тебя по ID' : 'Твой профиль скрыт от других'}</div>
      </div>
      <div class="toggle ${isPub ? 'on' : ''}" id="privacy-toggle"></div>
    </div>

    <!-- Поиск чужих профилей -->
    <div class="section-title">
      <span>НАЙТИ ИГРОКА</span>
      <span class="section-hint">введи user_id</span>
    </div>
    <div class="search-row">
      <input type="number" class="search-input" id="search-uid" placeholder="например, 123456789" inputmode="numeric"/>
      <button class="search-btn" id="search-btn">НАЙТИ</button>
    </div>
    <div id="search-result"></div>

  </div>`;

  setContent(html);

  // Хендлеры
  document.querySelectorAll('.showcase-slot').forEach(slot => {
    slot.addEventListener('click', (e) => {
      // если клик на крестик — снимаем
      if (e.target.dataset.slotRemove !== undefined) {
        e.stopPropagation();
        removeFromShowcase(parseInt(e.target.dataset.slotRemove));
        return;
      }
      const idx = parseInt(slot.dataset.slot);
      openPicker(idx);
    });
  });
  document.getElementById('privacy-toggle').addEventListener('click', togglePrivacy);
  document.getElementById('search-btn').addEventListener('click', doSearch);
  document.getElementById('search-uid').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') doSearch();
  });
}

function slotEmpty(i) {
  return `<div class="showcase-slot" data-slot="${i}">
    <div class="showcase-slot-plus">+</div>
    <div class="showcase-slot-label">Слот ${i+1}</div>
  </div>`;
}

function escapeHtml(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Picker модалка ──
let pickerCurrentSlot = -1;
function openPicker(slotIdx) {
  pickerCurrentSlot = slotIdx;
  const myItems = state.myItems || [];
  const showcase = (state.profile && state.profile.showcase) || [];
  const taken = new Set(showcase);
  // Текущий выбор этого слота можно показывать как picked, но позволяем выбрать другую
  let body = '';
  if (myItems.length === 0) {
    body = `<div class="picker-empty">У тебя пока нет NFT.<br/>Получи их сначала :)</div>`;
  } else {
    body = `<div class="picker-grid">` + myItems.map(card => {
      const palette = RARITY_PALETTE[card.rarity] || RARITY_PALETTE.common;
      const svg = getWeaponSVG(card.weapon, card.rarity);
      const name = card.name_ru || card.name_en || card.weapon || card.id;
      const isPicked = showcase[slotIdx] === card.id;
      const inOther = taken.has(card.id) && !isPicked;
      return `<div class="picker-item ${isPicked ? 'picked' : ''}"
                   data-pick="${escapeHtml(card.id)}"
                   style="${inOther ? 'opacity:0.4;' : ''}">
        <div class="picker-item-vis">${svg}</div>
        <div class="picker-item-name" style="color: ${palette.col};">${escapeHtml(name)}</div>
      </div>`;
    }).join('') + `</div>`;
  }
  document.getElementById('picker-body').innerHTML = body;
  document.getElementById('picker').classList.add('show');
  // Хендлеры на айтемы
  document.querySelectorAll('.picker-item[data-pick]').forEach(el => {
    el.addEventListener('click', () => {
      const id = el.dataset.pick;
      pickForSlot(id);
    });
  });
}

function closePicker() {
  document.getElementById('picker').classList.remove('show');
}
document.getElementById('picker-close').addEventListener('click', closePicker);
document.getElementById('picker').addEventListener('click', (e) => {
  if (e.target.id === 'picker') closePicker();
});

async function pickForSlot(nftId) {
  if (pickerCurrentSlot < 0) return;
  const showcase = ((state.profile && state.profile.showcase) || []).slice();
  // Если этот NFT уже в другом слоте — поменяем местами
  const existingIdx = showcase.indexOf(nftId);
  if (existingIdx >= 0 && existingIdx !== pickerCurrentSlot) {
    // Swap: то что было в нашем слоте, отправим на existingIdx
    const oldInOurSlot = showcase[pickerCurrentSlot];
    showcase[existingIdx] = oldInOurSlot || null;
  }
  // Расширяем массив если короткий
  while (showcase.length <= pickerCurrentSlot) showcase.push(null);
  showcase[pickerCurrentSlot] = nftId;
  // Убираем null'ы (отрицательная позиция)
  const cleaned = showcase.filter(x => x);
  await saveShowcase(cleaned);
  closePicker();
}

async function removeFromShowcase(slotIdx) {
  const showcase = ((state.profile && state.profile.showcase) || []).slice();
  showcase.splice(slotIdx, 1);
  await saveShowcase(showcase);
}

async function saveShowcase(nftIds) {
  const r = await apiPost('/casino/profile/showcase', { nft_ids: nftIds });
  if (r.ok) {
    state.profile.showcase = r.showcase;
    try { tg.HapticFeedback.impactOccurred('light'); } catch(e) {}
    renderProfile();
  } else {
    showToast(r.message || r.error || 'Ошибка');
  }
}

async function togglePrivacy() {
  const isPub = !(state.profile && state.profile.is_public);
  const r = await apiPost('/casino/profile/privacy', { is_public: isPub });
  if (r.ok) {
    state.profile.is_public = r.is_public;
    try { tg.HapticFeedback.impactOccurred('light'); } catch(e) {}
    renderProfile();
  } else {
    showToast(r.message || r.error || 'Ошибка');
  }
}

async function doSearch() {
  const inp = document.getElementById('search-uid');
  const targetStr = (inp.value || '').trim();
  if (!targetStr) return;
  const target = parseInt(targetStr);
  if (!target || target < 1) {
    showToast('Введи корректный ID');
    return;
  }
  const btn = document.getElementById('search-btn');
  btn.disabled = true; btn.textContent = '…';
  const resultEl = document.getElementById('search-result');
  resultEl.innerHTML = '';
  const r = await api(`/casino/profile/view?target=${target}`);
  btn.disabled = false; btn.textContent = 'НАЙТИ';
  if (!r.ok) {
    if (r.error === 'user_not_found') {
      resultEl.innerHTML = `<div class="profile-empty-hint">Игрок с ID ${target} не найден</div>`;
    } else {
      resultEl.innerHTML = `<div class="profile-empty-hint">${escapeHtml(r.message || r.error || 'Ошибка')}</div>`;
    }
    return;
  }
  if (r.is_private) {
    resultEl.innerHTML = `<div class="profile-empty-hint">🔒 Профиль игрока ${target} скрыт</div>`;
    return;
  }
  renderForeignProfile(r, resultEl);
}

function renderForeignProfile(p, container) {
  const showcase = p.showcase || [];
  let slotsHtml = '';
  if (showcase.length === 0) {
    slotsHtml = `<div class="profile-empty-hint">Игрок не выбрал NFT для витрины</div>`;
  } else {
    slotsHtml = `<div class="showcase-grid">` + showcase.map(card => {
      const palette = RARITY_PALETTE[card.rarity] || RARITY_PALETTE.common;
      const svg = getWeaponSVG(card.weapon, card.rarity);
      const name = card.name_ru || card.name_en || card.weapon || card.id;
      const supply = card.max_supply ? `#${card.serial || '?'}/${card.max_supply}` : '';
      return `<div class="showcase-slot filled" data-rarity="${card.rarity}"
                   style="--card-rarity: ${palette.col}; --card-rarity-glow: ${palette.col}40; cursor: default;">
        <div class="mini-weapon">${svg}</div>
        <div class="mini-name">${escapeHtml(name)}</div>
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 9px; color: var(--text-2); margin-top: 2px;">${supply}</div>
      </div>`;
    }).join('') + `</div>`;
  }
  const initial = String(p.user_id).slice(-1).toUpperCase();
  container.innerHTML = `
    <div class="profile-header" style="margin-top: 16px;">
      <div class="profile-avatar" style="background: linear-gradient(135deg, #5BA9FF, #B96FFF);">${initial}</div>
      <div class="profile-info-flex">
        <div class="profile-name">Игрок ${p.user_id}</div>
        <div class="profile-id">ID: ${p.user_id} · ${p.nft_count || 0} NFT</div>
      </div>
    </div>
    <div class="section-title"><span>ВИТРИНА ИГРОКА</span></div>
    ${slotsHtml}
  `;
}

// ═══════════════════════════════════════════════════════════
// P2P NFT (v133)
// ═══════════════════════════════════════════════════════════
async function loadP2P() {
  const r = await api('/casino/p2p/list');
  if (!r.ok) return null;
  state.p2pData = r;
  return r;
}

async function showP2P() {
  setContent(`<div class="p2p-container">
    <div class="skel" style="height: 60px; border-radius: 10px; margin-bottom: 16px;"></div>
    <div class="skel" style="height: 110px; border-radius: 12px; margin-bottom: 12px;"></div>
    <div class="skel" style="height: 110px; border-radius: 12px;"></div>
  </div>`);
  await loadP2P();
  if (state.tab === 'p2p') renderP2P();
}

function renderP2P() {
  const d = state.p2pData || {};
  const items = d.items || [];
  const myUid = (state.me && state.me.uid) || 0;

  // Шапка со статистикой моих лимитов
  const listingsLeft = (d.limit_listings || 3) - (d.my_listings_today || 0);
  const salesLeft    = (d.limit_sales || 3)    - (d.my_sales_today || 0);
  let header = `
    <div class="p2p-stats">
      <div class="p2p-stat ${listingsLeft <= 0 ? 'warning' : ''}">
        <div class="p2p-stat-num">${listingsLeft}</div>
        <div class="p2p-stat-label">Выставлений<br/>осталось</div>
      </div>
      <div class="p2p-stat ${salesLeft <= 0 ? 'warning' : ''}">
        <div class="p2p-stat-num">${salesLeft}</div>
        <div class="p2p-stat-label">Продаж<br/>осталось</div>
      </div>
      <div class="p2p-stat">
        <div class="p2p-stat-num">${items.length}</div>
        <div class="p2p-stat-label">Активных<br/>листингов</div>
      </div>
    </div>`;

  // Информер про комиссию
  const commission = d.commission_percent || 7;
  const minPct = d.price_min_pct || 5;
  const maxPct = d.price_max_pct || 500;
  header += `<div class="price-hint" style="margin-bottom: 16px;">
    Комиссия маркета: <span class="num">${commission}%</span> с продавца.
    Диапазон цен: от <span class="num">${minPct}%</span> до <span class="num">${maxPct}%</span> цены каталога.
    Лимиты: ${d.limit_listings} листингов и ${d.limit_sales} продаж в сутки.
  </div>`;

  // Список листингов
  let body = '';
  if (items.length === 0) {
    body = `<div class="p2p-empty">
      <div class="p2p-empty-icon">🤝</div>
      Пока нет листингов от игроков.<br/>
      Выстави свою NFT — открой её во вкладке МОИ и нажми «Продать».
    </div>`;
  } else {
    body = items.map(it => renderP2PListing(it, myUid)).join('');
  }

  setContent(`<div class="p2p-container">${header}${body}</div>`);

  // Обработчики кнопок
  document.querySelectorAll('[data-buy-listing]').forEach(b => {
    b.addEventListener('click', () => buyListing(b.dataset.buyListing));
  });
  document.querySelectorAll('[data-cancel-listing]').forEach(b => {
    b.addEventListener('click', () => cancelMyListing(b.dataset.cancelListing));
  });
}

function renderP2PListing(it, myUid) {
  const palette = RARITY_PALETTE[it.rarity] || RARITY_PALETTE.common;
  const svg = getWeaponSVG(it.weapon, it.rarity);
  const name = it.name_ru || it.name_en || it.weapon || it.nft_id;
  const rarityLabel = (RARITY_LABEL[it.rarity] || it.rarity || '').toUpperCase();
  const isMy = it.is_my;
  const supplyTag = it.max_supply ? `#${it.serial}/${it.max_supply}` : `#${it.serial}`;

  // Сравнение с ценой каталога
  const cat = it.catalog_price || 0;
  let priceDiff = '';
  if (cat) {
    const ratio = it.price / cat;
    if (ratio < 0.9)      priceDiff = `<span style="color:#5BE6A9;">↓ ${Math.round((1-ratio)*100)}% дешевле</span>`;
    else if (ratio > 1.1) priceDiff = `<span style="color:#FF6B6B;">↑ ${Math.round((ratio-1)*100)}% дороже</span>`;
    else                  priceDiff = `<span>~ цена каталога</span>`;
  }

  return `<div class="p2p-listing" data-rarity="${it.rarity}"
                style="--card-rarity: ${palette.col}; --card-rarity-glow: ${palette.col}55;">
    <div class="p2p-seller-badge ${isMy ? 'is-mine' : ''}">${isMy ? 'МОЁ' : 'ID ' + it.seller_uid}</div>
    <div class="p2p-listing-top">
      <div class="p2p-listing-vis">${svg}</div>
      <div class="p2p-listing-info">
        <div class="p2p-listing-name">${escapeHtml(name)}</div>
        <div class="p2p-listing-meta">
          <span class="p2p-listing-rarity">${rarityLabel}</span>
          <span class="p2p-listing-serial">${supplyTag}</span>
        </div>
      </div>
    </div>
    <div class="p2p-listing-bottom">
      <div class="p2p-listing-price-block">
        <div class="p2p-listing-price">${fmtTokens(it.price)} 💰</div>
        <div class="p2p-listing-catalog">${priceDiff}</div>
      </div>
      ${isMy
        ? `<button class="p2p-listing-btn cancel" data-cancel-listing="${it.listing_id}">СНЯТЬ</button>`
        : `<button class="p2p-listing-btn buy" data-buy-listing="${it.listing_id}">КУПИТЬ</button>`
      }
    </div>
  </div>`;
}

async function buyListing(listingId) {
  if (!confirm('Купить эту NFT?')) return;
  try { tg.HapticFeedback.impactOccurred('medium'); } catch(e) {}
  const r = await apiPost('/casino/p2p/buy', { listing_id: listingId });
  if (r.ok) {
    showToast('✓ Куплено! NFT в твоей коллекции');
    // Обновляем баланс
    if (state.me) state.me.balance = r.buyer_new_balance;
    document.getElementById('balanceVal').textContent = fmtTokens(r.buyer_new_balance);
    // Сбрасываем кэши и обновляем
    state.myItems = null;
    state.p2pData = null;
    await loadMy();
    await loadP2P();
    if (state.tab === 'p2p') renderP2P();
  } else {
    showToast(r.message || r.error || 'Ошибка');
  }
}

async function cancelMyListing(listingId) {
  if (!confirm('Снять с продажи?')) return;
  try { tg.HapticFeedback.impactOccurred('light'); } catch(e) {}
  const r = await apiPost('/casino/p2p/cancel', { listing_id: listingId });
  if (r.ok) {
    showToast('Листинг снят');
    state.p2pData = null;
    await loadP2P();
    if (state.tab === 'p2p') renderP2P();
  } else {
    showToast(r.message || r.error || 'Ошибка');
  }
}

// ═══════════════════════════════════════════════════════════
// Sell-модалка (выставление NFT на продажу)
// ═══════════════════════════════════════════════════════════
let sellModalNft = null;

function openSellModal(nft) {
  sellModalNft = nft;
  const catalogPrice = nft.price || 0;
  document.getElementById('sell-modal-nft-name').textContent =
    `${nft.name_ru || nft.weapon} · #${nft.serial}`;
  document.getElementById('sell-price').value = catalogPrice;
  updateSellHint();
  document.getElementById('sell-modal').classList.add('show');
  setTimeout(() => document.getElementById('sell-price').focus(), 100);
}

function closeSellModal() {
  document.getElementById('sell-modal').classList.remove('show');
  sellModalNft = null;
}

function updateSellHint() {
  if (!sellModalNft) return;
  const catalogPrice = sellModalNft.price || 0;
  if (!catalogPrice) {
    document.getElementById('sell-hint').innerHTML =
      `<span class="err">Эта NFT не имеет цены каталога</span>`;
    return;
  }
  const minP = Math.floor(catalogPrice * 0.05);
  const maxP = Math.floor(catalogPrice * 5);
  const price = parseInt(document.getElementById('sell-price').value) || 0;
  let warning = '';
  const inp = document.getElementById('sell-price');
  inp.classList.remove('invalid');
  if (price > 0 && price < minP) {
    warning = `<span class="err">Слишком дёшево (минимум ${fmtTokens(minP)})</span>`;
    inp.classList.add('invalid');
  } else if (price > maxP) {
    warning = `<span class="err">Слишком дорого (максимум ${fmtTokens(maxP)})</span>`;
    inp.classList.add('invalid');
  } else if (price > 0) {
    const commission = Math.floor(price * 0.07);
    const payout = price - commission;
    warning = `Цена каталога: <span class="num">${fmtTokens(catalogPrice)}</span><br/>
               Получишь после комиссии 7%: <span class="num">${fmtTokens(payout)}</span> (комиссия ${fmtTokens(commission)})`;
  }
  const limits = `Диапазон: <span class="num">${fmtTokens(minP)}</span> — <span class="num">${fmtTokens(maxP)}</span>`;
  document.getElementById('sell-hint').innerHTML = warning ? `${warning}<br/>${limits}` : limits;
}

async function confirmSell() {
  if (!sellModalNft) return;
  const price = parseInt(document.getElementById('sell-price').value) || 0;
  if (price <= 0) { showToast('Введите цену'); return; }
  try { tg.HapticFeedback.impactOccurred('medium'); } catch(e) {}
  const btn = document.getElementById('sell-modal-confirm');
  btn.disabled = true; btn.textContent = '...';
  const r = await apiPost('/casino/p2p/create', {
    nft_id: sellModalNft.id,
    serial: sellModalNft.serial,
    price: price,
  });
  btn.disabled = false; btn.textContent = 'ВЫСТАВИТЬ';
  if (r.ok) {
    showToast(`✓ Выставлено за ${fmtTokens(price)}`);
    closeSellModal();
    closeModal();
    // Сбросим кэш P2P
    state.p2pData = null;
    if (state.tab === 'p2p') {
      await loadP2P();
      renderP2P();
    }
  } else {
    showToast(r.message || r.error || 'Ошибка');
  }
}

// Хендлеры sell-модалки
document.getElementById('sell-price').addEventListener('input', updateSellHint);
document.getElementById('sell-modal-cancel').addEventListener('click', closeSellModal);
document.getElementById('sell-modal-confirm').addEventListener('click', confirmSell);
document.getElementById('sell-modal').addEventListener('click', (e) => {
  if (e.target.id === 'sell-modal') closeSellModal();
});

// Старт: грузим профиль + обе пачки параллельно
loadMe();
loadMy();
loadMarket();

</script>
